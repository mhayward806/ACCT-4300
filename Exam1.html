<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exam 1 Review – Interactive Outline</title>
  <style>
    :root{
      --bg:#0b0f17;
      --panel:#121a2a;
      --panel2:#0f1626;
      --text:#e7eefc;
      --muted:#a8b6d6;
      --good:#58d68d;
      --warn:#f4d03f;
      --bad:#ff6b6b;
      --accent:#7aa2ff;
      --border:rgba(255,255,255,.10);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 16px;
      --radius2: 12px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      background: radial-gradient(1200px 700px at 20% -10%, rgba(122,162,255,.25), transparent 60%),
                  radial-gradient(900px 600px at 90% 10%, rgba(88,214,141,.18), transparent 50%),
                  var(--bg);
      min-height:100vh;
    }
    header{
      max-width:1200px;
      margin:0 auto;
      padding:18px 18px 10px;
      display:flex; align-items:flex-start; justify-content:space-between; gap:12px; flex-wrap:wrap;
    }
    .titleBlock{display:flex; gap:12px; align-items:flex-start; flex-wrap:wrap}
    .badge{
      background: rgba(122,162,255,.18);
      border:1px solid rgba(122,162,255,.35);
      padding:6px 10px; border-radius:999px;
      color:var(--text);
      font-size:12px;
      height:fit-content;
    }
    h1{margin:0; font-size:20px; letter-spacing:.2px}
    p.sub{margin:6px 0 0; color:var(--muted); line-height:1.35; max-width: 72ch;}
    .rightBtns{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    button, input, select, textarea{font-family:var(--sans)}
    button{
      cursor:pointer;
      border:1px solid var(--border);
      color:var(--text);
      background: rgba(122,162,255,.12);
      border-radius:12px;
      padding:10px 12px;
      transition: transform .04s ease, background .12s ease;
    }
    button:hover{background: rgba(122,162,255,.20)}
    button:active{transform: translateY(1px)}
    button.secondary{background: rgba(255,255,255,.06)}
    button.secondary:hover{background: rgba(255,255,255,.10)}
    button.danger{
      background: rgba(255,107,107,.15);
      border-color: rgba(255,107,107,.35);
    }
    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:10px 18px 26px;
    }
    .grid{
      display:grid;
      grid-template-columns: 320px 1fr;
      gap:14px;
    }
    @media (max-width: 980px){
      .grid{grid-template-columns:1fr}
      .sidebar{position:relative}
    }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow: var(--shadow);
    }
    .card .hd{
      padding:14px 14px 10px;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
    }
    .card .bd{padding:14px}
    .pill{
      font-size:12px;
      color:var(--muted);
      border:1px solid var(--border);
      background: rgba(0,0,0,.18);
      border-radius:999px;
      padding:6px 10px;
      display:inline-flex;
      gap:8px;
      align-items:center;
    }
    .searchRow{display:flex; gap:10px; align-items:center}
    input[type="text"]{
      width:100%;
      background: rgba(0,0,0,.25);
      color:var(--text);
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px 10px;
      outline:none;
    }
    .navList{display:grid; gap:8px; margin-top:10px}
    .navItem{
      padding:10px 10px;
      border-radius:12px;
      border:1px solid var(--border);
      background: rgba(0,0,0,.18);
      cursor:pointer;
      display:flex; gap:10px; align-items:flex-start;
    }
    .navItem:hover{border-color: rgba(122,162,255,.35)}
    .navItem.active{border-color: rgba(122,162,255,.65); background: rgba(122,162,255,.10)}
    .navItem .num{
      font-family:var(--mono);
      font-size:12px;
      color:var(--muted);
      width:20px;
      flex:0 0 auto;
      margin-top:1px;
    }
    .navItem .txt .t{font-size:14px; margin:0 0 4px}
    .navItem .txt .d{font-size:12px; color:var(--muted); line-height:1.3}
    .tabs{display:flex; gap:8px; flex-wrap:wrap}
    .tabBtn{padding:8px 10px; font-size:12px}
    .tabBtn.active{border-color: rgba(122,162,255,.65); background: rgba(122,162,255,.18)}
    .sectionTitle{font-size:18px; margin:0}
    .sectionSub{color:var(--muted); margin:8px 0 0; line-height:1.35}
    .divider{height:1px; background: var(--border); margin:12px 0}
    .cards{display:grid; gap:12px; margin-top:12px}
    .miniCard{
      border:1px solid var(--border);
      border-radius: var(--radius2);
      background: rgba(0,0,0,.18);
      padding:12px;
    }
    .miniCard h3{margin:0 0 6px; font-size:14px}
    .miniCard ul{margin:8px 0 0; padding-left:18px; color: var(--muted); line-height:1.35}
    .callout{
      border-left: 4px solid rgba(244,208,63,.65);
      padding:10px 12px;
      border-radius: 10px;
      background: rgba(244,208,63,.08);
      border:1px solid rgba(244,208,63,.22);
      color: var(--text);
    }
    .callout b{color: var(--warn)}
    .revealBox{
      margin-top:10px;
      border:1px solid var(--border);
      border-radius: 12px;
      background: rgba(0,0,0,.20);
      padding:10px 10px;
    }
    .revealBox .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
    .revealBox .q{font-size:13px; color: var(--text); line-height:1.35}
    .revealBox .a{margin-top:8px; color: var(--muted); display:none; line-height:1.35}
    .tiny{font-size:12px; color: var(--muted); line-height:1.35}
    .mono{font-family: var(--mono); font-size: 12px; color: var(--muted); white-space: pre-wrap;}
    .kbd{
      font-family: var(--mono);
      font-size: 12px;
      border:1px solid var(--border);
      background: rgba(0,0,0,.22);
      padding:2px 6px;
      border-radius: 8px;
      color: var(--muted);
    }
  </style>
</head>

<script>
/*
  =========================================
  EDIT THE CONTENT HERE 👇
  =========================================
  Each section has:
    - id, title, description
    - takeaways: short bullets (what to remember)
    - examples: quick examples or mini-scenarios
    - confusions: common mistakes / “watch out” notes
    - microChecks: small prompts with revealable guidance (NOT answer keys)
*/

const SECTIONS = [
  {
    id: "ais_basics",
    title: "AIS basics: data → information → decisions",
    description: "Anchor the definitions and what an AIS is trying to accomplish. If you know this section cold, the rest of the exam feels more intuitive.",
    takeaways: [
      "Data = raw facts collected/recorded/stored; information = processed/organized data with meaning.",
      "Primary AIS objective: collect/record/store/process data to produce information for decision makers.",
      "AIS connects people, procedures, data, software, IT infrastructure, and internal controls."
    ],
    examples: [
      {
        title: "Data vs information (quick example)",
        text: "Data: customer ID, invoice amount, invoice date. Information: aging report showing who is past due and by how much (used for credit/collection decisions)."
      },
      {
        title: "Why AIS matters",
        text: "Two firms can record the same transactions, but the firm with better information outputs (timely, complete, relevant) makes better pricing/credit decisions and has fewer control failures."
      }
    ],
    confusions: [
      "Students often list software features when asked about AIS—remember AIS includes people + procedures + data + software + IT infrastructure + controls.",
      "‘Information’ isn’t automatically ‘good information’—quality depends on characteristics like accuracy, completeness, timeliness."
    ],
    microChecks: [
      {
        q: "In one sentence: What’s the difference between data and information?",
        a: "Look for: raw facts vs processed meaning. If you describe a report/dashboard and what it helps you decide, you’re in ‘information’ territory."
      },
      {
        q: "If an AIS report is correct but arrives too late to act, which information characteristic is failing?",
        a: "Timeliness. Useful information needs to arrive in time for a decision maker to do something with it."
      }
    ]
  },

  {
    id: "useful_info",
    title: "Characteristics of useful information",
    description: "Be able to recognize these in examples. Many exam questions are just these characteristics in disguise.",
    takeaways: [
      "Accuracy: correct and free of error.",
      "Completeness: doesn’t omit important aspects.",
      "Timeliness/Availability: accessible when needed and in time to act.",
      "Reputability/Verifiability: credible and can be confirmed; access should be restricted to authorized parties.",
      "Conciseness: clear/brief without losing key meaning."
    ],
    examples: [
      {
        title: "Timely vs accurate",
        text: "A perfectly accurate cash forecast delivered after payroll clears is not useful for avoiding an overdraft. Accuracy ≠ timeliness."
      },
      {
        title: "Complete vs concise",
        text: "A 30-page report can be complete but not concise. A 1-page summary can be concise but incomplete."
      }
    ],
    confusions: [
      "‘Available’ (you can access it) and ‘timely’ (it arrives in time) are related but not identical.",
      "Reputable/verifiable is often tested via “audit trail,” documentation, and ability to confirm."
    ],
    microChecks: [
      {
        q: "You’re given a report that leaves out cancelled orders. Which characteristic is failing?",
        a: "Completeness. Missing relevant events/activities = incomplete information."
      }
    ]
  },

  {
    id: "dpc_crud",
    title: "Data processing cycle + CRUD",
    description: "Know what gets captured, what the system does to it, and where it ends up. This underlies process diagrams and controls.",
    takeaways: [
      "Data is collected about activities (events), resources affected, and people/agents involved.",
      "CRUD = Create, Read, Update, Delete (core processing actions).",
      "Good systems define how records are created, accessed, changed, and retired—then controls enforce it."
    ],
    examples: [
      {
        title: "CRUD in a revenue cycle",
        text: "Create: new customer record; Read: check credit limit; Update: record shipment/invoice; Delete: deactivate inactive customer record (with policy)."
      },
      {
        title: "What data is captured?",
        text: "Activity: shipping. Resource: inventory decreases. People: warehouse staff / carrier."
      }
    ],
    confusions: [
      "CRUD is not ‘the whole AIS’—it’s a basic lens on how systems process data.",
      "Deletion is usually controlled (retention policies), not casual."
    ],
    microChecks: [
      {
        q: "If the system prevents a user from changing a posted invoice, what type of control is that supporting?",
        a: "Data integrity / processing control. It limits improper updates and protects the audit trail."
      }
    ]
  },

  {
    id: "storage_types",
    title: "Data storage types: lake vs warehouse vs ledgers/journals",
    description: "Know what each storage type is for and what ‘kind’ of data it holds (raw vs structured vs accounting balances).",
    takeaways: [
      "Data lake: raw/native format, flexible structure; often very large.",
      "Data warehouse: structured/processed, optimized for analytics and reporting.",
      "Data mart: smaller, focused subset for a specific function/user group.",
      "Journals/ledgers: accounting-focused storage (transaction journals, subsidiary ledgers, general ledger)."
    ],
    examples: [
      {
        title: "Where would the following live? Raw web clickstream logs, sales dataset, AR balances",
        text: "Raw web clickstream logs: data lake. Cleaned sales dataset for dashboards: warehouse. A/R subledger balances: subsidiary ledger; summarized to the general ledger."
      },
      {
        title: "What is the difference between specialized and general journals?",
        text: "Consider the type of transactions in each."
      }
    ],
    confusions: [
      "A warehouse isn’t simply ‘big data’—it’s structured/curated for decision use.",
      "Ledgers/journals store accounting records; they’re not interchangeable with analytics storage."
    ],
    microChecks: [
      {
        q: "You need structured monthly reporting across the org. Lake or warehouse?",
        a: "Warehouse. The key word is structured/standardized reporting."
      }
    ]
  },

  {
    id: "rag",
    title: "Retrieval-Augmented Generation (RAG) for accounting work",
    description: "You had this in your outline—students don’t need to code it, but they should understand the idea: AI + retrieval from your documents.",
    takeaways: [
      "RAG combines a language model with retrieval from external documents/data not in its original training corpus.",
      "Goal: more grounded answers using current, relevant context (contracts, risk assessments, prior pricing, policy docs).",
      "Still needs controls: access restrictions, data governance, and validation."
    ],
    examples: [
      {
        title: "Audit engagement pricing (your outline example, expanded)",
        text: "To price a new engagement, you want: the current contract scope, the client’s risk assessment, last year’s hours and billing rates, and similar prior engagements. A RAG tool retrieves those documents and summarizes relevant parts."
      },
      {
        title: "Policy Q&A for staff",
        text: "A staff auditor asks, “When do we require dual approval for write-offs?” RAG retrieves the firm policy and gives a short answer with citations/snippets."
      }
    ],
    confusions: [
      "RAG doesn’t magically make answers ‘correct’—it improves grounding, but the retrieved docs can still be wrong/outdated.",
      "Access control matters: the tool should only retrieve what the user is authorized to see."
    ],
    microChecks: [
      {
        q: "What’s the main reason RAG can outperform a plain chatbot in an audit firm setting?",
        a: "Because it can pull the most relevant current documents (contracts, risk assessments, prior files) instead of guessing from general training."
      }
    ]
  },

  {
    id: "erp",
    title: "ERP systems: why firms adopt + tradeoffs",
    description: "Know the integration story and the implementation pain points. Exam questions often test pros/cons.",
    takeaways: [
      "ERP integrates processes across the org, centralizing data and streamlining operations.",
      "Pros: reduces silos/redundancy, improves integration/maintenance, supports transaction processing.",
      "Cons: cost/time, process change, complexity, training/user resistance.",
      "Cloud/SaaS can reduce upfront costs, but implementation/change management still matters."
    ],
    examples: [
      {
        title: "ERP impact example",
        text: "Without ERP: sales, inventory, and A/R systems don’t talk; staff reconciles manually. With ERP: one integrated workflow updates inventory, A/R, and GL in near-real time."
      }
    ],
    confusions: [
      "ERP isn’t ‘just buying software’—it often forces business process redesign.",
      "Integration can increase the ‘blast radius’ of errors if controls are weak."
    ],
    microChecks: [
      {
        q: "What’s one risk of ERP integration if internal controls are weak?",
        a: "Bad data can propagate quickly across modules (e.g., incorrect pricing affects billing, A/R, revenue, and reporting)."
      }
    ]
  },

  {
    id: "docs_diagrams",
    title: "Documentation: BPD vs flowchart vs DFD",
    description: "Be able to identify which diagram you would use and what it emphasizes.",
    takeaways: [
      "BPD (business process diagram): emphasizes steps/activities and often who does them (works with narratives).",
      "Flowchart: pictorial system view showing processing steps, decisions, documents, controls; used for analysis/audit/training.",
      "DFD (data flow diagram): focuses on how data moves among sources/destinations, processes, and data stores."
    ],
    examples: [
      {
        title: "When to use DFD",
        text: "If the question is ‘Where does customer order data go after entry?’ DFD is ideal because it highlights flows + stores."
      },
      {
        title: "When to use a flowchart",
        text: "If the question is ‘Where can errors/fraud occur and what controls exist?’ flowcharts help because they show decisions, approvals, and documents."
      }
    ],
    confusions: [
      "DFDs are not about who approves what; they’re about data movement.",
      "BPDs can feel like flowcharts, but BPDs are more high-level and role/step-oriented."
    ],
    microChecks: [
      {
        q: "A question asks: ‘Show data moving from customer order entry to the A/R file and then to monthly statements.’ Which diagram?",
        a: "DFD. That description is literally data flows + stores."
      }
    ]
  },

  {
    id: "process_mining",
    title: "Process mining: event logs + what you can learn",
    description: "Know what an event log contains and what process mining does with it.",
    takeaways: [
      "Event log records: (1) event description, (2) timestamp, (3) unique identifier that links events (case/order/customer ID).",
      "Process mining uses event logs to discover/monitor/improve actual processes (not just ‘ideal’ ones).",
      "Metrics can include cycle times and performance measures"
    ],
    examples: [
      {
        title: "UberEats example (expanded)",
        text: "Case ID: order number. Events: select food, pay, prep, pickup, deliver. Each event has timestamps. Process mining visualizes the real flow and bottlenecks."
      },
      {
        title: "Metrics for cash collections: DIO, DSO, DPO",
        text: "Days sales outstanding (DSO) uses A/R and sales to indicate how quickly customers pay. Days inventory outstanding (DSO) tells how long on average inventory sits before being sold. Days payable outstanding tells how long on average the firm take to pay suppliers. Process mining can reveal where delays occur (billing vs disputes vs collections)."
      }
    ],
    confusions: [
      "Process mining requires quality event logs—missing timestamps or IDs breaks the analysis.",
      "The ‘process map’ you get is what happened in data, not necessarily what policy says should happen."
    ],
    microChecks: [
      {
        q: "What’s the one field that links events together across time for the same ‘case’ (e.g., order)?",
        a: "The unique identifier (case/order/customer ID)."
      }
    ]
  },

  {
    id: "rev_cycle",
    title: "Revenue cycle: flow, documents, threats, and controls",
    description: "Know the order of documents and the core threats. Controls should be explainable as ‘what risk it reduces.’",
    takeaways: [
      "Activities: sales order entry → shipping → billing → cash collections.",
      "Document flow (typical): sales order → bill of lading/shipping doc → invoice → cash receipt/deposit slip.",
      "Key threats in order entry: inaccurate/incomplete orders, invalid orders, uncollectible accounts, stockouts/excess inventory, loss of customers.",
      "Cash collections controls: segregation of duties, minimize cash handling (EFT/lockbox), list all payments, restrictive endorsement, daily deposits."
    ],
    examples: [
      {
        title: "Fake invoice risk (expanded)",
        text: "If a fraudster can upload invoices, they may create fake invoices or redirect payments. Controls focus on restricting invoice creation/upload, approvals, and matching to shipping/order evidence."
      },
      {
        title: "Manager reports",
        text: "Aging schedule (credit/collections), customer statements, sales by product/customer, returns/allowances reports—these are information outputs managers use to monitor the cycle."
      }
    ],
    confusions: [
      "Segregation of duties helps, but if one person can fabricate multiple documents, matching may not detect fraud (they can ‘make the trail’).",
      "Students sometimes memorize controls without connecting them to a threat. Always tie control → threat it mitigates."
    ],
    microChecks: [
      {
        q: "What’s the best one-sentence explanation of why lockbox reduces risk?",
        a: "It reduces employee handling of cash and speeds deposits, lowering theft and delay risk."
      },
      {
        q: "Why does matching (order → shipping → invoice) help reduce fake billing?",
        a: "It forces consistency across independent evidence. Billing should be supported by a real shipment/order, not just an invoice."
      }
    ]
  },

  {
    id: "exp_cycle",
    title: "Expenditure cycle: voucher package + paying risks",
    description: "Know the activity sequence and how the voucher package supports authorization and accuracy.",
    takeaways: [
      "Activities: ordering → receiving → approving supplier invoice → cash disbursements.",
      "Voucher package contains: purchase order + receiving report + supplier invoice.",
      "High-price controls: price lists, competitive bidding, PO review/authorization, budgets.",
      "Kickback controls: no-gifts policy, job rotation/mandatory vacations, disclose conflicts, supplier audits."
    ],
    examples: [
      {
        title: "Why voucher package matters",
        text: "PO proves authorization, receiving report proves goods/services received, invoice proves amount billed. Together they reduce paying for things not ordered/received or paying wrong amounts."
      }
    ],
    confusions: [
      "‘Approving an invoice’ shouldn’t be just rubber-stamping—it should involve matching to PO and receiving evidence.",
      "Budgets are controls only if someone actually monitors and investigates variances."
    ],
    microChecks: [
      {
        q: "If the firm pays for items never received, which voucher package piece likely failed or was missing?",
        a: "Receiving report (or the matching process that confirms receipt)."
      }
    ]
  },

  {
    id: "inventory",
    title: "Inventory: EOQ + controls",
    description: "Be able to explain what EOQ balances and what controls prevent inventory errors and theft.",
    takeaways: [
      "EOQ minimizes total of ordering + carrying + stockout costs.",
      "Ordering costs: purchase transaction processing; carrying costs: holding/warehousing; stockout: shortages/lost sales/delays.",
      "Inventory controls: perpetual records, barcodes/RFID, training, periodic physical counts, forecasting/activity reports."
    ],
    examples: [
      {
        title: "EOQ intuition",
        text: "Order too little too often → high ordering costs. Order huge batches → high carrying costs. Order poorly timed → stockouts."
      }
    ],
    confusions: [
      "Perpetual inventory records don’t guarantee accuracy—physical counts validate the records.",
      "RFID/barcodes reduce errors, but controls still need good procedures and access restrictions."
    ],
    microChecks: [
      {
        q: "If recorded inventory is consistently higher than physical counts, what issues might you suspect?",
        a: "Theft/shrinkage, recording errors, or timing issues in updates. The key is the mismatch between records and reality."
      }
    ]
  },

  {
    id: "fs_consequences",
    title: "Financial statement consequences when controls fail",
    description: "You don’t need to reteach financial reporting—just connect control failures to what can go wrong in statements.",
    takeaways: [
      "Paying too much can reduce income; mispriced purchases can distort COGS and inventory valuation.",
      "Assets may be recorded at improper amounts (inventory, A/R, fixed assets).",
      "Revenue can be inflated via fake sales orders/shipments or premature recognition if controls over shipping/billing are weak."
    ],
    examples: [
      {
        title: "Control failure → misstatement map",
        text: "Weak receiving controls → inventory and expenses misstated. Weak billing controls → revenue/A/R misstated. Weak cash handling → cash and A/R collections issues."
      }
    ],
    confusions: [
      "A control failure doesn’t always mean fraud—it can also cause unintentional errors that still create misstatements."
    ],
    microChecks: [
      {
        q: "Give one example of a revenue-cycle control failure and the likely account(s) affected.",
        a: "Look for pairings like: weak shipping confirmation → overstated revenue/A/R; weak collections controls → understated cash or misstated A/R aging/allowance."
      }
    ]
  }
];

// Student view: hide section descriptions
SECTIONS.forEach(s => { s.description = ""; });

const LS_KEY = "exam1_outline_widget_v1";
const $ = (id) => document.getElementById(id);

const state = {
  tab: "outline",
  activeId: SECTIONS[0]?.id,
  search: "",
  expandedAll: false,
  progress: {
    visited: {}, // sectionId -> true
    microShown: {} // sectionId -> count of revealed micro-check answers
  }};

function loadState(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return;
    const s = JSON.parse(raw);
    if(s && typeof s === "object"){
      state.progress = s.progress || state.progress;
      state.activeId = s.activeId || state.activeId;
      state.tab = s.tab || state.tab;
}
  }catch(e){}
}

function saveState(){
  try{
    localStorage.setItem(LS_KEY, JSON.stringify({
      progress: state.progress,
      activeId: state.activeId,
      tab: state.tab
    }));
  }catch(e){}
}

function resetProgress(){
  state.progress = {visited:{}, microShown:{}};
  saveState();
  renderProgress();
}

function completionPct(){
  const total = SECTIONS.length;
  const visited = Object.keys(state.progress.visited || {}).length;
  return total ? Math.round((visited/total)*100) : 0;
}

function renderProgress(){
  $("progressPill").textContent = `${completionPct()}% complete`;
}

function sectionById(id){
  return SECTIONS.find(s => s.id === id) || SECTIONS[0];
}

function matchesSearch(s){
  if(!state.search) return true;
  const hay = (s.title + " " +
               (s.takeaways||[]).join(" ") + " " +
               (s.examples||[]).map(e=>e.title+" "+e.text).join(" ") + " " +
               (s.confusions||[]).join(" ") + " " +
               (s.microChecks||[]).map(m=>m.q+" "+m.a).join(" ")
              ).toLowerCase();
  return hay.includes(state.search.toLowerCase());
}

function renderNav(){
  const list = $("navList");
  list.innerHTML = "";

  const filtered = SECTIONS.filter(matchesSearch);
  filtered.forEach((s, idx) => {
    const item = document.createElement("div");
    item.className = "navItem" + (s.id === state.activeId ? " active" : "");
    const visited = !!state.progress.visited?.[s.id];
    item.innerHTML = `
      <div class="num">${String(idx+1).padStart(2,"0")}</div>
      <div class="txt">
        <div class="t">${escapeHtml(s.title)} ${visited ? "✅" : ""}</div>
        
      </div>
    `;
    item.addEventListener("click", () => {
      state.activeId = s.id;
      state.progress.visited[s.id] = true;
      saveState();
      renderNav();
      renderMain();
      renderProgress();
    });
    list.appendChild(item);
  });

  if(filtered.length === 0){
    const empty = document.createElement("div");
    empty.className = "tiny";
    empty.textContent = "No matches. Try a different search term.";
    list.appendChild(empty);
  }
}

function renderMain(){
  const main = $("main");
  main.innerHTML = "";
const s = sectionById(state.activeId);
  $("sectionPill").textContent = "📌 " + s.title;

  const top = document.createElement("div");
  top.innerHTML = `
    <h2 class="sectionTitle">${escapeHtml(s.title)}</h2>
`;
  main.appendChild(top);

  const cards = document.createElement("div");
  cards.className = "cards";

  // Takeaways
  cards.appendChild(renderMiniCard("Key takeaways", s.takeaways));

  // Examples
  const exCard = document.createElement("div");
  exCard.className = "miniCard";
  exCard.innerHTML = `<h3>Examples & mini-scenarios</h3>`;
  if((s.examples||[]).length === 0){
    exCard.innerHTML += `<div class="tiny">No examples in this section yet.</div>`;
  } else {
    (s.examples||[]).forEach(ex => {
      const box = document.createElement("div");
      box.className = "revealBox";
      box.innerHTML = `
        <div class="row" style="justify-content:space-between">
          <div class="q"><b>${escapeHtml(ex.title)}</b></div>
          <button class="secondary" data-action="toggleExample">Show</button>
        </div>
        <div class="a">${escapeHtml(ex.text)}</div>
      `;
      exCard.appendChild(box);
    });
  }
  cards.appendChild(exCard);

  // Confusions
if((s.confusions||[]).length){
  const c = document.createElement("div");
  c.className = "miniCard";
  c.innerHTML = `<h3>Common confusions</h3>`;
  const ul = document.createElement("ul");
  (s.confusions||[]).forEach(x => {
    const li = document.createElement("li");
    li.textContent = x;
    ul.appendChild(li);
  });
  c.appendChild(ul);

  cards.appendChild(c);
}

  // Micro-checks
  const m = document.createElement("div");
  m.className = "miniCard";
  m.innerHTML = `<h3>Micro-checks</h3><div class="tiny">Try answering first. Then click “Reveal guidance” to self-check.</div>`;
  if((s.microChecks||[]).length === 0){
    m.innerHTML += `<div class="tiny" style="margin-top:8px">No micro-checks for this section yet.</div>`;
  } else {
    (s.microChecks||[]).forEach((mc, i) => {
      const box = document.createElement("div");
      box.className = "revealBox";
      box.innerHTML = `
        <div class="row" style="justify-content:space-between">
          <div class="q">${escapeHtml(mc.q)}</div>
          <button class="secondary" data-action="toggleMicro" data-idx="${i}">Reveal guidance</button>
        </div>
        <div class="a">${escapeHtml(mc.a)}</div>
      `;
      m.appendChild(box);
    });
  }
  cards.appendChild(m);

  main.appendChild(cards);

  // handlers
  main.querySelectorAll('button[data-action="toggleExample"]').forEach(btn => {
    btn.addEventListener("click", () => toggleReveal(btn));
  });
  main.querySelectorAll('button[data-action="toggleMicro"]').forEach(btn => {
    btn.addEventListener("click", () => {
      const idx = btn.getAttribute("data-idx");
      toggleReveal(btn);
      // track reveal count
      const secId = s.id;
      state.progress.microShown[secId] = (state.progress.microShown[secId] || 0) + 1;
      saveState();
    });
  });
}

function renderMiniCard(title, bullets){
  const card = document.createElement("div");
  card.className = "miniCard";
  card.innerHTML = `<h3>${escapeHtml(title)}</h3>`;
  if(!bullets || bullets.length === 0){
    card.innerHTML += `<div class="tiny">No items yet.</div>`;
    return card;
  }
  const ul = document.createElement("ul");
  bullets.forEach(b => {
    const li = document.createElement("li");
    li.textContent = b;
    ul.appendChild(li);
  });
  card.appendChild(ul);
  return card;
}

function toggleReveal(btn){
  const box = btn.closest(".revealBox");
  const a = box.querySelector(".a");
  const shown = a.style.display === "block";
  a.style.display = shown ? "none" : "block";
  btn.textContent = shown ? "Show" : "Hide";
}

function expandAll(){
  document.querySelectorAll("#main .revealBox .a").forEach(a => a.style.display = "block");
  document.querySelectorAll("#main .revealBox button.secondary").forEach(b => b.textContent = "Hide");
}
function collapseAll(){
  document.querySelectorAll("#main .revealBox .a").forEach(a => a.style.display = "none");
  document.querySelectorAll("#main .revealBox button.secondary").forEach(b => b.textContent = "Show");
}

function escapeHtml(s){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function setTab(tab){
  if(tab !== "outline") tab = "outline";
  state.tab = tab;
  $("tabOutline").classList.toggle("active", tab==="outline");
saveState();
  renderMain();
}

function init(){
  loadState();
  $("search").addEventListener("input", (e)=>{
    state.search = e.target.value || "";
    renderNav();
  });

  $("tabOutline").addEventListener("click", ()=> setTab("outline"));
$("btnExpandAll").addEventListener("click", expandAll);
  $("btnCollapseAll").addEventListener("click", collapseAll);
  $("btnReset").addEventListener("click", ()=>{
    if(confirm("Reset reading progress on this device?")){
      localStorage.removeItem(LS_KEY);
      resetProgress();
      renderNav();
      renderMain();
    }
  });

  // mark visited on first load
  if(state.activeId){
    state.progress.visited[state.activeId] = true;
  }
  saveState();

  renderNav();
  renderMain();
  renderProgress();
  // restore tab
  setTab("outline");
}

init();
</script>
</body>
</html>
